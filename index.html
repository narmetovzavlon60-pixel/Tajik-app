<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tajik Pro: Ultra</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0F0F1A; --surf: #1A1A2E; --prim: #FFB74D; --text: #E0E0E0; --green: #4CAF50; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        header { padding: 15px; background: var(--surf); display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--prim); z-index: 10; }
        .xp-badge { color: var(--prim); font-weight: bold; font-size: 1.1rem; }

        main { flex: 1; overflow-y: auto; position: relative; }
        .page { display: none; padding: 20px; min-height: 100%; }
        .page.active { display: block; animation: slide 0.2s ease-out; }
        @keyframes slide { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

        .card { background: var(--surf); padding: 20px; border-radius: 15px; margin-bottom: 12px; border-left: 4px solid var(--prim); cursor: pointer; }
        .game-display { height: 180px; background: var(--surf); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 2rem; margin-bottom: 20px; text-align: center; padding: 10px; border: 1px solid rgba(255,183,77,0.2); }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-opt { background: var(--surf); border: 1px solid var(--prim); color: white; padding: 18px 10px; border-radius: 12px; font-size: 1rem; }
        
        .drop-zone { min-height: 70px; background: rgba(255,255,255,0.03); border: 2px dashed var(--prim); border-radius: 12px; padding: 10px; margin: 15px 0; display: flex; flex-wrap: wrap; gap: 6px; }
        .word-chip { background: var(--prim); color: #000; padding: 8px 12px; border-radius: 6px; font-weight: bold; }
        .word-pool { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
        .chip-p { background: var(--surf); border: 1px solid var(--prim); padding: 8px 12px; border-radius: 6px; }

        .rank-item { display: flex; justify-content: space-between; padding: 12px; background: rgba(255,255,255,0.05); margin-bottom: 5px; border-radius: 8px; }
        .rank-1 { border: 1px solid gold; background: rgba(255,215,0,0.1); }

        nav { background: var(--surf); display: flex; justify-content: space-around; padding: 12px; border-top: 1px solid rgba(255,255,255,0.1); }
        .nav-btn { opacity: 0.5; font-size: 0.8rem; text-align: center; flex: 1; }
        .nav-btn.active { opacity: 1; color: var(--prim); }
        
        button.main-action { width: 100%; padding: 15px; background: var(--prim); border: none; border-radius: 10px; font-weight: 800; margin-top: 10px; }
    </style>
</head>
<body>

<header>
    <div id="u-display">👤 <span id="u-name">...</span></div>
    <div class="xp-badge">⭐ <span id="u-xp">0</span></div>
</header>

<main id="router">
    <section id="p-home" class="page active">
        <h2 style="margin-bottom: 15px;">Омӯзиш</h2>
        <div class="card" onclick="App.game.duels.start()">
            <h3>⚔️ Дуэли слов</h3>
            <p style="opacity: 0.6; font-size: 0.8rem;">500+ слов для изучения</p>
        </div>
        <div class="card" onclick="App.game.build.start()">
            <h3>🧱 Сборщик фраз</h3>
            <p style="opacity: 0.6; font-size: 0.8rem;">100+ предложений</p>
        </div>
    </section>

    <section id="g-duels" class="page">
        <div id="duel-q" class="game-display">...</div>
        <div id="duel-opts" class="grid-2"></div>
    </section>

    <section id="g-build" class="page">
        <h4 id="build-task" style="text-align: center; color: var(--prim);"></h4>
        <div id="build-target" class="drop-zone"></div>
        <div id="build-pool" class="word-pool"></div>
        <button class="main-action" onclick="App.game.build.check()">ПРОКЕРКА</button>
    </section>

    <section id="p-rank" class="page">
        <h2 style="margin-bottom: 20px;">Пешсафон</h2>
        <div id="rank-list"></div>
    </section>
</main>

<nav>
    <div class="nav-btn active" id="n-home" onclick="App.nav('p-home')">🏠<br>Главная</div>
    <div class="nav-btn" id="n-rank" onclick="App.nav('p-rank')">🏆<br>Рейтинг</div>
</nav>

<script>
const App = {
    tg: window.Telegram.WebApp,
    xp: parseInt(localStorage.getItem('xp')) || 0,
    
    // Оптимизированная БД
    db: {
        // Пример 500+ слов (здесь структура, добавьте свои пары)
        words: [
            {q:'Нон', a:'Хлеб'}, {q:'Об', a:'Вода'}, {q:'Китоб', a:'Книга'}, {q:'Дарахт', a:'Дерево'},
            {q:'Хона', a:'Дом'}, {q:'Шаҳр', a:'Город'}, {q:'Дӯст', a:'Друг'}, {q:'Осмон', a:'Небо'},
            // ... добавьте остальные 490+ слов здесь по аналогии
        ],
        phrases: [
            {ru:'Я иду в школу', tg:['Ман', 'ба', 'мактаб', 'меравам']},
            {ru:'Он читает книгу', tg:['Ӯ', 'китоб', 'мехонад']},
            {ru:'Мама дома', tg:['Модар', 'дар', 'хона', 'аст']},
            // ... добавьте остальные 90+ фраз здесь
        ],
        leaders: [
            {n: 'Davron_Pro', x: 2550}, {n: 'Malika_Learn', x: 1980}, 
            {n: 'Umed_99', x: 1420}, {n: 'Sitora_TJ', x: 950}
        ]
    },

    init() {
        this.tg.ready();
        this.tg.expand();
        document.getElementById('u-name').innerText = this.tg.initDataUnsafe?.user?.first_name || "Мехмон";
        this.updateXP(0);
        this.tg.BackButton.onClick(() => this.nav('p-home'));
    },

    nav(id) {
        // Логика переключения страниц и кнопок навигации
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        
        document.getElementById(id).classList.add('active');
        const navId = id === 'p-home' ? 'n-home' : 'n-rank';
        document.getElementById(navId).classList.add('active');

        if(id === 'p-home') this.tg.BackButton.hide();
        else this.tg.BackButton.show();

        if(id === 'p-rank') this.renderRank();
    },

    updateXP(v) {
        this.xp += v;
        localStorage.setItem('xp', this.xp);
        document.getElementById('u-xp').innerText = this.xp;
    },

    renderRank() {
        const list = document.getElementById('rank-list');
        list.innerHTML = '';
        const all = [...this.db.leaders, {n: 'Вы', x: this.xp}].sort((a,b) => b.x - a.x);
        
        all.forEach((l, i) => {
            const div = document.createElement('div');
            div.className = `rank-item ${i === 0 ? 'rank-1' : ''}`;
            div.innerHTML = `<span>${i+1}. ${l.n}</span> <b>${l.x} XP</b>`;
            list.appendChild(div);
        });
    },

    game: {
        duels: {
            pool: [],
            start() {
                this.pool = [...App.db.words].sort(() => Math.random() - 0.5);
                App.nav('g-duels');
                this.next();
            },
            next() {
                if(this.pool.length === 0) this.pool = [...App.db.words].sort(() => Math.random() - 0.5);
                const cur = this.pool.pop();
                const qDiv = document.getElementById('duel-q');
                qDiv.innerText = cur.q;
                qDiv.style.color = 'white';

                let options = [cur.a];
                while(options.length < 4) {
                    let r = App.db.words[Math.floor(Math.random()*App.db.words.length)].a;
                    if(!options.includes(r)) options.push(r);
                }
                options.sort(() => Math.random() - 0.5);

                const optDiv = document.getElementById('duel-opts');
                optDiv.innerHTML = '';
                options.forEach(o => {
                    const b = document.createElement('button');
                    b.className = 'btn-opt';
                    b.innerText = o;
                    b.onclick = () => {
                        if(o === cur.a) {
                            qDiv.style.color = 'var(--green)';
                            App.updateXP(10);
                            App.tg.HapticFeedback.impactOccurred('light');
                            setTimeout(() => this.next(), 400);
                        } else {
                            App.tg.HapticFeedback.notificationOccurred('error');
                            b.style.borderColor = 'red';
                        }
                    };
                    optDiv.appendChild(b);
                });
            }
        },
        build: {
            idx: 0,
            chosen: [],
            start() {
                this.idx = Math.floor(Math.random() * App.db.phrases.length);
                this.chosen = [];
                App.nav('g-build');
                this.render();
            },
            render() {
                const data = App.db.phrases[this.idx];
                document.getElementById('build-task').innerText = data.ru;
                
                const target = document.getElementById('build-target');
                target.innerHTML = '';
                this.chosen.forEach((w, i) => {
                    const c = document.createElement('div');
                    c.className = 'word-chip';
                    c.innerText = w;
                    c.onclick = () => { this.chosen.splice(i, 1); this.render(); };
                    target.appendChild(c);
                });

                const pool = document.getElementById('build-pool');
                pool.innerHTML = '';
                let remain = [...data.tg];
                this.chosen.forEach(cw => {
                    let pos = remain.indexOf(cw);
                    if(pos > -1) remain.splice(pos, 1);
                });

                remain.sort(() => Math.random() - 0.5).forEach(w => {
                    const c = document.createElement('div');
                    c.className = 'word-chip chip-p';
                    c.innerText = w;
                    c.onclick = () => { this.chosen.push(w); this.render(); };
                    pool.appendChild(c);
                });
            },
            check() {
                const data = App.db.phrases[this.idx];
                if(this.chosen.join(' ') === data.tg.join(' ')) {
                    App.updateXP(30);
                    App.tg.HapticFeedback.notificationOccurred('success');
                    this.idx = (this.idx + 1) % App.db.phrases.length;
                    this.chosen = [];
                    this.render();
                } else {
                    App.tg.HapticFeedback.notificationOccurred('warning');
                    alert("Хато! Кӯшиш кунед.");
                }
            }
        }
    }
};

App.init();
</script>
</body>
</html>
