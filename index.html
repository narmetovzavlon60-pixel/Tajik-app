<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tajik Pro: Game Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0F0F1A; --surf: #1A1A2E; --prim: #FFB74D; --text: #E0E0E0; --green: #4CAF50; --red: #FF5252; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        header { padding: 12px 15px; background: var(--surf); display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--prim); z-index: 10; }
        .stats-top { display: flex; gap: 15px; font-weight: bold; }
        .lives { color: var(--red); font-size: 1.1rem; }
        .xp-badge { color: var(--prim); }

        main { flex: 1; overflow-y: auto; position: relative; }
        .page { display: none; padding: 20px; min-height: 100%; }
        .page.active { display: block; }

        .card { background: var(--surf); padding: 18px; border-radius: 15px; margin-bottom: 12px; border-left: 4px solid var(--prim); }
        .game-display { height: 160px; background: var(--surf); border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; margin-bottom: 20px; text-align: center; border: 1px solid rgba(255,183,77,0.1); position: relative; }
        
        /* Combo Badge */
        .combo-tag { position: absolute; top: 10px; right: 10px; background: var(--prim); color: #000; padding: 4px 8px; border-radius: 5px; font-weight: 900; font-size: 0.8rem; display: none; }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-opt { background: var(--surf); border: 1.5px solid var(--prim); color: white; padding: 18px 5px; border-radius: 12px; font-weight: 600; }
        
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(15,15,26,0.98); display:none; flex-direction:column; align-items:center; justify-content:center; z-index:1000; padding:30px; }
        .res-val { font-size: 1.8rem; color: var(--prim); margin: 5px 0 20px 0; font-weight: 800; }

        nav { background: var(--surf); display: flex; justify-content: space-around; padding: 12px; border-top: 1px solid rgba(255,255,255,0.05); }
        .nav-btn { opacity: 0.4; font-size: 0.75rem; text-align: center; flex: 1; }
        .nav-btn.active { opacity: 1; color: var(--prim); }
        
        .main-action { width: 100%; padding: 16px; background: var(--prim); border: none; border-radius: 12px; font-weight: 800; color: #000; margin-top: 10px; }
    </style>
</head>
<body>

<header>
    <div class="stats-top">
        <span class="lives" id="u-lives">❤️❤️❤️</span>
        <span class="xp-badge">⭐ <span id="u-xp">0</span></span>
    </div>
    <div style="font-size: 0.9rem; opacity: 0.8;" id="u-name">Загрузка...</div>
</header>

<div id="res-modal" class="modal">
    <h2 id="res-title" style="color:var(--red);">БОЗӢ ТАМОМ!</h2>
    <div style="margin-top:20px; opacity:0.7;">БА ДАСТ ОВАРДЕД:</div>
    <div id="res-xp" class="res-val">+0 XP</div>
    <div style="opacity:0.7;">МАКС. КОМБО:</div>
    <div id="res-combo" class="res-val">x1</div>
    <button class="main-action" onclick="App.nav('p-home')">БА АСОСӢ</button>
</div>

<main>
    <section id="p-home" class="page active">
        <div style="background:var(--surf); padding:15px; border-radius:12px; margin-bottom:20px; text-align:center; border:1px solid var(--prim);">
            <div style="font-size:0.8rem; opacity:0.6;">КАЛИМАИ РӮЗ</div>
            <div id="daily-word" style="font-size:1.4rem; font-weight:bold; color:var(--prim); margin-top:5px;">Об - Вода</div>
        </div>
        
        <div class="card" onclick="App.startGame('sprint')">
            <h3>⚡ Спринт</h3>
            <p style="opacity:0.6; font-size:0.8rem;">Тез бош! 30 сония ва 3 ҳаёт.</p>
        </div>
        <div class="card" onclick="App.startGame('duels')">
            <h3>⚔️ Дуэли калимаҳо</h3>
            <p style="opacity:0.6; font-size:0.8rem;">Тарҷумаи дурустро ёбед.</p>
        </div>
        <div class="card" onclick="App.startGame('build')">
            <h3>🧱 Созандаи ҷумла</h3>
            <p style="opacity:0.6; font-size:0.8rem;">Ҷумлаҳоро дуруст созед.</p>
        </div>
    </section>

    <section id="g-sprint" class="page">
        <div id="spr-time" style="text-align:center; color:var(--prim); font-weight:bold; margin-bottom:10px;">30s</div>
        <div class="game-display">
            <div id="combo-anim" class="combo-tag">x2 COMBO</div>
            <div id="spr-q" style="font-size:2.2rem; font-weight:bold;">...</div>
            <div id="spr-a" style="opacity:0.7; font-size:1.3rem; margin-top:10px;">...</div>
        </div>
        <div class="grid-2">
            <button class="btn-opt" style="border-color:var(--red); color:var(--red);" onclick="App.game.sprint.check(false)">НЕВЕРНО</button>
            <button class="btn-opt" style="border-color:var(--green); color:var(--green);" onclick="App.game.sprint.check(true)">ВЕРНО</button>
        </div>
    </section>

    <section id="g-duels" class="page">
        <div class="game-display">
            <div id="combo-duel" class="combo-tag">x2</div>
            <div id="duel-q" style="font-size:2rem; font-weight:bold;">...</div>
        </div>
        <div id="duel-opts" class="grid-2"></div>
    </section>

    <section id="g-build" class="page">
        <div id="build-task" style="text-align:center; margin-bottom:10px; min-height:1.2rem;"></div>
        <div id="build-target" class="drop-zone"></div>
        <div id="build-pool" style="display:flex; flex-wrap:wrap; gap:8px; justify-content:center;"></div>
        <button class="main-action" onclick="App.game.build.check()">ПРОВЕРИТЬ</button>
    </section>

    <section id="p-rank" class="page">
        <h2 style="margin-bottom:15px;">Пешсафон</h2>
        <div id="rank-list"></div>
    </section>
</main>

<nav>
    <div class="nav-btn active" id="n-home" onclick="App.nav('p-home')">🏠<br>Асосӣ</div>
    <div class="nav-btn" id="n-rank" onclick="App.nav('p-rank')">🏆<br>Рейтинг</div>
</nav>

<script>
const App = {
    tg: window.Telegram.WebApp,
    xp: parseInt(localStorage.getItem('xp_v5')) || 0,
    lives: 3,
    currentCombo: 0,
    maxCombo: 0,
    sessionXP: 0,
    
    db: {
        // СЮДА ТЫ ДОБАВИШЬ СВОИ 700 СЛОВ
        words: [
            {q:'Нон', a:'Хлеб'}, {q:'Об', a:'Вода'}, {q:'Осмон', a:'Небо'}, {q:'Хона', a:'Дом'},
            {q:'Китоб', a:'Книга'}, {q:'Дӯст', a:'Друг'}, {q:'Шаҳр', a:'Город'}, {q:'Дарахт', a:'Дерево'},
            {q:'Модар', a:'Мать'}, {q:'Падар', a:'Отец'}, {q:'Бародар', a:'Брат'}, {q:'Хоҳар', a:'Сестра'}
        ],
        phrases: [
            {ru:'Как дела?', tg:['Аҳволи', 'шумо', 'чист?']},
            {ru:'Я иду домой', tg:['Ман', 'ба', 'хона', 'меравам']}
        ]
    },

    init() {
        this.tg.ready();
        this.tg.expand();
        document.getElementById('u-name').innerText = this.tg.initDataUnsafe?.user?.first_name || "Меҳмон";
        this.updateXP(0);
        this.setDailyWord();
        
        this.tg.BackButton.onClick(() => {
            if(confirm("Выйти из игры? Прогресс раунда будет потерян.")) {
                this.endGame();
            }
        });
    },

    setDailyWord() {
        const w = this.db.words[Math.floor(Math.random()*this.db.words.length)];
        document.getElementById('daily-word').innerText = `${w.q} - ${w.a}`;
    },

    nav(id) {
        document.getElementById('res-modal').style.display = 'none';
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        this.tg.BackButton[id === 'p-home' ? 'hide' : 'show']();
        if(id === 'p-rank') this.renderRank();
    },

    updateXP(v) {
        this.xp += v;
        localStorage.setItem('xp_v5', this.xp);
        document.getElementById('u-xp').innerText = this.xp;
    },

    updateLives(delta) {
        this.lives += delta;
        let s = "";
        for(let i=0; i<3; i++) s += i < this.lives ? "❤️" : "🖤";
        document.getElementById('u-lives').innerText = s;
        if(this.lives <= 0) this.endGame();
    },

    startGame(type) {
        this.lives = 3;
        this.sessionXP = 0;
        this.currentCombo = 0;
        this.maxCombo = 0;
        this.updateLives(0);
        this.nav('g-' + type);
        this.game[type].start();
    },

    endGame() {
        if(this.game.sprint.timer) clearInterval(this.game.sprint.timer);
        document.getElementById('res-xp').innerText = `+${this.sessionXP} XP`;
        document.getElementById('res-combo').innerText = `x${this.maxCombo}`;
        document.getElementById('res-modal').style.display = 'flex';
        this.tg.HapticFeedback.notificationOccurred('warning');
    },

    handleAnswer(isCorrect, xpBase) {
        if(isCorrect) {
            this.currentCombo++;
            if(this.currentCombo > this.maxCombo) this.maxCombo = this.currentCombo;
            
            // Расчет бонуса комбо: x1, x1.5, x2 и т.д.
            let bonus = Math.floor(xpBase * (1 + (this.currentCombo * 0.1)));
            this.sessionXP += bonus;
            this.updateXP(bonus);
            this.tg.HapticFeedback.impactOccurred('light');
            
            // Показ плашки комбо
            const tags = document.querySelectorAll('.combo-tag');
            tags.forEach(t => {
                if(this.currentCombo > 1) {
                    t.innerText = `x${this.currentCombo} COMBO`;
                    t.style.display = 'block';
                }
            });
        } else {
            this.currentCombo = 0;
            document.querySelectorAll('.combo-tag').forEach(t => t.style.display = 'none');
            this.updateLives(-1);
            this.tg.HapticFeedback.notificationOccurred('error');
        }
    },

    game: {
        sprint: {
            timeLeft: 30, timer: null, curCorrect: false,
            start() {
                this.timeLeft = 30;
                this.next();
                this.timer = setInterval(() => {
                    this.timeLeft--;
                    document.getElementById('spr-time').innerText = this.timeLeft + 's';
                    if(this.timeLeft <= 0) App.endGame();
                }, 1000);
            },
            next() {
                const isTrue = Math.random() > 0.5;
                const word = App.db.words[Math.floor(Math.random()*App.db.words.length)];
                document.getElementById('spr-q').innerText = word.q;
                if(isTrue) {
                    document.getElementById('spr-a').innerText = word.a;
                    this.curCorrect = true;
                } else {
                    let randA = App.db.words[Math.floor(Math.random()*App.db.words.length)].a;
                    document.getElementById('spr-a').innerText = randA;
                    this.curCorrect = false;
                }
            },
            check(ans) {
                App.handleAnswer(ans === this.curCorrect, 15);
                if(App.lives > 0) this.next();
            }
        },
        duels: {
            start() { this.next(); },
            next() {
                const cur = App.db.words[Math.floor(Math.random()*App.db.words.length)];
                document.getElementById('duel-q').innerText = cur.q;
                let opts = [cur.a];
                while(opts.length < 4) {
                    let r = App.db.words[Math.floor(Math.random()*App.db.words.length)].a;
                    if(!opts.includes(r)) opts.push(r);
                }
                opts.sort(()=>Math.random()-0.5);
                const cont = document.getElementById('duel-opts');
                cont.innerHTML = '';
                opts.forEach(o => {
                    const b = document.createElement('button');
                    b.className = 'btn-opt'; b.innerText = o;
                    b.onclick = () => {
                        App.handleAnswer(o === cur.a, 10);
                        if(App.lives > 0) this.next();
                    };
                    cont.appendChild(b);
                });
            }
        },
        build: {
            idx:0, chosen:[],
            start() { this.idx = Math.floor(Math.random()*App.db.phrases.length); this.chosen=[]; this.render(); },
            render() {
                const data = App.db.phrases[this.idx];
                document.getElementById('build-task').innerText = data.ru;
                const target = document.getElementById('build-target');
                target.innerHTML = '';
                this.chosen.forEach((w,i) => {
                    const c = document.createElement('div');
                    c.className = 'word-chip'; c.innerText = w;
                    c.onclick = () => { this.chosen.splice(i,1); this.render(); };
                    target.appendChild(c);
                });
                const pool = document.getElementById('build-pool');
                pool.innerHTML = '';
                let remain = [...data.tg];
                this.chosen.forEach(cw => { let p = remain.indexOf(cw); if(p>-1) remain.splice(p,1); });
                remain.forEach(w => {
                    const c = document.createElement('div');
                    c.className = 'word-chip'; c.style.background = "var(--surf)"; c.style.color = "white";
                    c.innerText = w;
                    c.onclick = () => { this.chosen.push(w); this.render(); };
                    pool.appendChild(c);
                });
            },
            check() {
                const data = App.db.phrases[this.idx];
                const win = this.chosen.join(' ') === data.tg.join(' ');
                App.handleAnswer(win, 40);
                if(win) this.start();
            }
        }
