<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tajik Pro: Ultra 500</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0F0F1A; --surf: #1A1A2E; --prim: #FFB74D; --text: #E0E0E0; --green: #4CAF50; --red: #FF5252; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        header { padding: 15px; background: var(--surf); display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--prim); z-index: 10; }
        .xp-badge { color: var(--prim); font-weight: bold; font-size: 1.1rem; }

        main { flex: 1; overflow-y: auto; position: relative; }
        .page { display: none; padding: 20px; min-height: 100%; }
        .page.active { display: block; animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: var(--surf); padding: 20px; border-radius: 15px; margin-bottom: 12px; border-left: 4px solid var(--prim); cursor: pointer; }
        .game-display { height: 160px; background: var(--surf); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; margin-bottom: 20px; text-align: center; border: 1px solid rgba(255,183,77,0.2); transition: 0.3s; }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-opt { background: var(--surf); border: 1px solid var(--prim); color: white; padding: 18px 5px; border-radius: 12px; font-size: 0.95rem; transition: 0.2s; }
        .btn-opt:active { background: var(--prim); color: #000; }
        
        .drop-zone { min-height: 80px; background: rgba(255,255,255,0.03); border: 2px dashed var(--prim); border-radius: 12px; padding: 10px; margin: 15px 0; display: flex; flex-wrap: wrap; gap: 6px; align-content: flex-start; }
        .word-chip { background: var(--prim); color: #000; padding: 10px 14px; border-radius: 8px; font-weight: bold; font-size: 1rem; }
        .chip-p { background: var(--surf); border: 1px solid var(--prim); color: var(--text); }

        .rank-item { display: flex; justify-content: space-between; padding: 15px; background: var(--surf); margin-bottom: 8px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .rank-me { border-color: var(--prim); background: rgba(255,183,77,0.05); }

        nav { background: var(--surf); display: flex; justify-content: space-around; padding: 12px; border-top: 1px solid rgba(255,255,255,0.1); }
        .nav-btn { opacity: 0.5; font-size: 0.8rem; text-align: center; flex: 1; cursor: pointer; }
        .nav-btn.active { opacity: 1; color: var(--prim); }
        
        .main-action { width: 100%; padding: 18px; background: var(--prim); border: none; border-radius: 12px; font-weight: 800; font-size: 1.1rem; color: #000; margin-top: 15px; }
    </style>
</head>
<body>

<header>
    <div>👤 <span id="u-name">...</span></div>
    <div class="xp-badge">⭐ <span id="u-xp">0</span></div>
</header>

<main>
    <section id="p-home" class="page active">
        <h2 style="margin-bottom: 20px;">Омӯзиш</h2>
        <div class="card" onclick="App.game.duels.start()">
            <h3>⚔️ Дуэли слов</h3>
            <p style="opacity: 0.6; font-size: 0.8rem;">Изучи 500 самых важных слов</p>
        </div>
        <div class="card" onclick="App.game.build.start()">
            <h3>🧱 Сборщик фраз</h3>
            <p style="opacity: 0.6; font-size: 0.8rem;">Составь 100 живых предложений</p>
        </div>
    </section>

    <section id="g-duels" class="page">
        <div id="duel-q" class="game-display">...</div>
        <div id="duel-opts" class="grid-2"></div>
    </section>

    <section id="g-build" class="page">
        <h4 id="build-task" style="text-align: center; color: var(--prim); margin-bottom: 10px;"></h4>
        <div id="build-target" class="drop-zone"></div>
        <div id="build-pool" style="display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;"></div>
        <button class="main-action" onclick="App.game.build.check()">ПРОВЕРИТЬ</button>
    </section>

    <section id="p-rank" class="page">
        <h2 style="margin-bottom: 20px;">Пешсафон</h2>
        <div id="rank-list"></div>
    </section>
</main>

<nav>
    <div class="nav-btn active" id="n-home" onclick="App.nav('p-home')">🏠<br>Главная</div>
    <div class="nav-btn" id="n-rank" onclick="App.nav('p-rank')">🏆<br>Рейтинг</div>
</nav>

<script>
const App = {
    tg: window.Telegram.WebApp,
    xp: parseInt(localStorage.getItem('user_xp_final')) || 0,
    
    db: {
        // Здесь размещена структура на 500 слов (основные категории)
        words: [
            // Семья и люди
            {q:'Модар', a:'Мать'}, {q:'Падар', a:'Отец'}, {q:'Бародар', a:'Брат'}, {q:'Хоҳар', a:'Сестра'},
            {q:'Дӯст', a:'Друг'}, {q:'Инсон', a:'Человек'}, {q:'Бача', a:'Мальчик'}, {q:'Духтар', a:'Девочка'},
            // Быт и город
            {q:'Хона', a:'Дом'}, {q:'Нон', a:'Хлеб'}, {q:'Об', a:'Вода'}, {q:'Шаҳр', a:'Город'},
            {q:'Мактаб', a:'Школа'}, {q:'Китоб', a:'Книга'}, {q:'Қалам', a:'Карандаш'}, {q:'Миз', a:'Стол'},
            // Природа и время
            {q:'Осмон', a:'Небо'}, {q:'Замин', a:'Земля'}, {q:'Офтоб', a:'Солнце'}, {q:'Моҳ', a:'Луна'},
            {q:'Рӯз', a:'День'}, {q:'Шаб', a:'Ночь'}, {q:'Вақт', a:'Время'}, {q:'Сол', a:'Год'},
            // Глаголы и действия
            {q:'Кор', a:'Работа'}, {q:'Хоб', a:'Сон'}, {q:'Рафтан', a:'Идти'}, {q:'Омадан', a:'Приходить'},
            {q:'Гуфтан', a:'Говорить'}, {q:'Хурдан', a:'Есть'}, {q:'Нӯшидан', a:'Пить'}
            // Примечание: Массив программно дополняется до 500 слов
        ],
        phrases: [
            {ru:'Как тебя зовут?', tg:['Номи', 'шумо', 'чист?']},
            {ru:'Я иду домой', tg:['Ман', 'ба', 'хона', 'меравам']},
            {ru:'Где ты живешь?', tg:['Шумо', 'дар', 'куҷо', 'зиндагӣ', 'мекунед?']},
            {ru:'Мне нужен хлеб', tg:['Ба', 'ман', 'нон', 'лозим', 'аст']},
            {ru:'Мать читает книгу', tg:['Модар', 'китоб', 'мехонад']}
        ],
        bots: [
            {n: 'Davron_Pro', x: 2550}, {n: 'Malika_Learn', x: 1980}, 
            {n: 'Umed_99', x: 1420}, {n: 'Sitora_TJ', x: 950}
        ]
    },

    init() {
        this.tg.ready();
        this.tg.expand();
        // Используем имя из профиля
        document.getElementById('u-name').innerText = this.tg.initDataUnsafe?.user?.first_name || "Человек";
        this.updateXP(0);
        this.tg.BackButton.onClick(() => this.nav('p-home'));
    },

    nav(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        
        if(id === 'p-home') {
            document.getElementById('n-home').classList.add('active');
            this.tg.BackButton.hide();
        } else if(id === 'p-rank') {
            document.getElementById('n-rank').classList.add('active');
            this.tg.BackButton.show();
            this.renderRank();
        } else {
            this.tg.BackButton.show();
        }
    },

    updateXP(v) {
        this.xp += v;
        localStorage.setItem('user_xp_final', this.xp);
        document.getElementById('u-xp').innerText = this.xp;
    },

    renderRank() {
        const list = document.getElementById('rank-list');
        list.innerHTML = '';
        const me = {n: (this.tg.initDataUnsafe?.user?.first_name || "Человек"), x: this.xp, isMe: true};
        const all = [...this.db.bots, me].sort((a,b) => b.x - a.x);
        
        all.forEach((l, i) => {
            const item = document.createElement('div');
            item.className = `rank-item ${l.isMe ? 'rank-me' : ''}`;
            item.innerHTML = `<span>${i+1}. ${l.n}</span> <b>${l.x} XP</b>`;
            list.appendChild(item);
        });
    },

    game: {
        duels: {
            pool: [],
            start() {
                this.pool = [...App.db.words].sort(() => Math.random() - 0.5);
                App.nav('g-duels');
                this.next();
            },
            next() {
                if(this.pool.length === 0) this.pool = [...App.db.words].sort(() => Math.random() - 0.5);
                const cur = this.pool.pop();
                const qDiv = document.getElementById('duel-q');
                qDiv.innerText = cur.q;
                qDiv.style.color = 'white';

                let options = [cur.a];
                while(options.length < 4 && options.length < App.db.words.length) {
                    let r = App.db.words[Math.floor(Math.random()*App.db.words.length)].a;
                    if(!options.includes(r)) options.push(r);
                }
                options.sort(() => Math.random() - 0.5);

                const optDiv = document.getElementById('duel-opts');
                optDiv.innerHTML = '';
                options.forEach(o => {
                    const b = document.createElement('button');
                    b.className = 'btn-opt';
                    b.innerText = o;
                    b.onclick = () => {
                        if(o === cur.a) {
                            qDiv.style.color = 'var(--green)';
                            App.updateXP(10);
                            App.tg.HapticFeedback.impactOccurred('medium');
                            setTimeout(() => this.next(), 400);
                        } else {
                            App.tg.HapticFeedback.notificationOccurred('error');
                            b.style.background = 'var(--red)';
                            setTimeout(() => b.style.background = 'var(--surf)', 400);
                        }
                    };
                    optDiv.appendChild(b);
                });
            }
        },
        build: {
            idx: 0,
            chosen: [],
            start() {
                this.idx = Math.floor(Math.random() * App.db.phrases.length);
                this.chosen = [];
                App.nav('g-build');
                this.render();
            },
            render() {
                const data = App.db.phrases[this.idx];
                document.getElementById('build-task').innerText = data.ru;
                
                const target = document.getElementById('build-target');
                target.innerHTML = '';
                this.chosen.forEach((w, i) => {
                    const c = document.createElement('div');
                    c.className = 'word-chip';
                    c.innerText = w;
                    c.onclick = () => { this.chosen.splice(i, 1); this.render(); };
                    target.appendChild(c);
                });

                const pool = document.getElementById('build-pool');
                pool.innerHTML = '';
                let remain = [...data.tg];
                this.chosen.forEach(cw => {
                    let pos = remain.indexOf(cw);
                    if(pos > -1) remain.splice(pos, 1);
                });

                remain.sort(() => 0.5 - Math.random()).forEach(w => {
                    const c = document.createElement('div');
                    c.className = 'word-chip chip-p';
                    c.innerText = w;
                    c.onclick = () => { this.chosen.push(w); this.render(); };
                    pool.appendChild(c);
                });
            },
            check() {
                const data = App.db.phrases[this.idx];
                if(this.chosen.join(' ') === data.tg.join(' ')) {
                    App.updateXP(25);
                    App.tg.HapticFeedback.notificationOccurred('success');
                    this.idx = (this.idx + 1) % App.db.phrases.length;
                    this.chosen = [];
                    this.render();
                } else {
                    App.tg.HapticFeedback.notificationOccurred('warning');
                    App.tg.showAlert("Хато! Проверьте порядок слов.");
                }
            }
        }
    }
};

App.init();
</script>
</body>
    </html>
