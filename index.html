<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tajik Pro: Ultra Max</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0F0F1A; --surf: #1A1A2E; --prim: #FFB74D; --text: #E0E0E0; --green: #4CAF50; --red: #FF5252; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        header { padding: 15px; background: var(--surf); display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--prim); z-index: 10; }
        .xp-badge { color: var(--prim); font-weight: bold; font-size: 1.1rem; }

        main { flex: 1; overflow-y: auto; position: relative; }
        .page { display: none; padding: 20px; min-height: 100%; }
        .page.active { display: block; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: var(--surf); padding: 20px; border-radius: 15px; margin-bottom: 12px; border-left: 4px solid var(--prim); cursor: pointer; }
        .game-display { height: 160px; background: var(--surf); border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 1.5rem; margin-bottom: 20px; text-align: center; border: 1px solid rgba(255,183,77,0.2); }
        .word-main { font-size: 2.2rem; font-weight: bold; margin-bottom: 10px; }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-opt { background: var(--surf); border: 1px solid var(--prim); color: white; padding: 20px 5px; border-radius: 12px; font-size: 1.1rem; }
        .btn-yes { border-color: var(--green); color: var(--green); }
        .btn-no { border-color: var(--red); color: var(--red); }
        
        .drop-zone { min-height: 80px; background: rgba(255,255,255,0.03); border: 2px dashed var(--prim); border-radius: 12px; padding: 10px; margin: 15px 0; display: flex; flex-wrap: wrap; gap: 6px; }
        .word-chip { background: var(--prim); color: #000; padding: 10px 14px; border-radius: 8px; font-weight: bold; }
        .chip-p { background: var(--surf); border: 1px solid var(--prim); color: var(--text); }

        .rank-item { display: flex; justify-content: space-between; padding: 15px; background: var(--surf); margin-bottom: 8px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .rank-me { border-color: var(--prim); background: rgba(255,183,77,0.05); }

        .timer { font-size: 1.2rem; color: var(--prim); margin-bottom: 10px; font-weight: bold; }

        nav { background: var(--surf); display: flex; justify-content: space-around; padding: 12px; border-top: 1px solid rgba(255,255,255,0.1); }
        .nav-btn { opacity: 0.5; font-size: 0.8rem; text-align: center; flex: 1; cursor: pointer; }
        .nav-btn.active { opacity: 1; color: var(--prim); }
        
        .main-action { width: 100%; padding: 18px; background: var(--prim); border: none; border-radius: 12px; font-weight: 800; color: #000; margin-top: 15px; }
    </style>
</head>
<body>

<header>
    <div>👤 <span id="u-name">...</span></div>
    <div class="xp-badge">⭐ <span id="u-xp">0</span></div>
</header>

<main>
    <section id="p-home" class="page active">
        <h2 style="margin-bottom: 15px;">Выбор режима</h2>
        <div class="card" onclick="App.game.sprint.start()">
            <h3>⚡ Спринт</h3>
            <p style="opacity: 0.6; font-size: 0.8rem;">Успей ответить за 30 секунд!</p>
        </div>
        <div class="card" onclick="App.game.duels.start()">
            <h3>⚔️ Дуэли слов</h3>
            <p style="opacity: 0.6; font-size: 0.8rem;">Найди правильный перевод</p>
        </div>
        <div class="card" onclick="App.game.build.start()">
            <h3>🧱 Сборщик фраз</h3>
            <p style="opacity: 0.6; font-size: 0.8rem;">Собери предложение правильно</p>
        </div>
    </section>

    <section id="g-sprint" class="page">
        <div style="text-align: center;">
            <div id="spr-time" class="timer">30s</div>
            <div class="game-display">
                <div id="spr-q" class="word-main">Нон</div>
                <div id="spr-a" style="opacity: 0.7;">Хлеб</div>
            </div>
            <div class="grid-2">
                <button class="btn-opt btn-no" onclick="App.game.sprint.check(false)">НЕВЕРНО</button>
                <button class="btn-opt btn-yes" onclick="App.game.sprint.check(true)">ВЕРНО</button>
            </div>
        </div>
    </section>

    <section id="g-duels" class="page">
        <div id="duel-q" class="game-display">...</div>
        <div id="duel-opts" class="grid-2"></div>
    </section>

    <section id="g-build" class="page">
        <h4 id="build-task" style="text-align: center; color: var(--prim); margin-bottom: 10px;"></h4>
        <div id="build-target" class="drop-zone"></div>
        <div id="build-pool" style="display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;"></div>
        <button class="main-action" onclick="App.game.build.check()">ПРОВЕРИТЬ</button>
    </section>

    <section id="p-rank" class="page">
        <h2 style="margin-bottom: 20px;">Пешсафон</h2>
        <div id="rank-list"></div>
    </section>
</main>

<nav>
    <div class="nav-btn active" id="n-home" onclick="App.nav('p-home')">🏠<br>Главная</div>
    <div class="nav-btn" id="n-rank" onclick="App.nav('p-rank')">🏆<br>Рейтинг</div>
</nav>

<script>
const App = {
    tg: window.Telegram.WebApp,
    xp: parseInt(localStorage.getItem('user_xp_ultra')) || 0,
    
    db: {
        words: [
            {q:'Нон', a:'Хлеб'}, {q:'Об', a:'Вода'}, {q:'Китоб', a:'Книга'}, {q:'Хона', a:'Дом'},
            {q:'Шаҳр', a:'Город'}, {q:'Дӯст', a:'Друг'}, {q:'Осмон', a:'Небо'}, {q:'Офтоб', a:'Солнце'},
            {q:'Мактаб', a:'Школа'}, {q:'Дарахт', a:'Дерево'}, {q:'Зиндагӣ', a:'Жизнь'}, {q:'Вақт', a:'Время'},
            {q:'Кор', a:'Работа'}, {q:'Даст', a:'Рука'}, {q:'Чашм', a:'Глаз'}, {q:'Дил', a:'Сердце'},
            {q:'Замин', a:'Земля'}, {q:'Модар', a:'Мать'}, {q:'Падар', a:'Отец'}, {q:'Бародар', a:'Брат'},
            {q:'Хоҳар', a:'Сестра'}, {q:'Шаб', a:'Ночь'}, {q:'Рӯз', a:'День'}, {q:'Ранг', a:'Цвет'},
            {q:'Калон', a:'Большой'}, {q:'Хурд', a:'Маленький'}, {q:'Зебо', a:'Красивый'}, {q:'Гарм', a:'Горячий'}
            // Сюда можно дописать остальные до 500
        ],
        phrases: [
            {ru:'Как дела?', tg:['Аҳволи', 'шумо', 'чист?']},
            {ru:'Я иду домой', tg:['Ман', 'ба', 'хона', 'меравам']},
            {ru:'Книга на столе', tg:['Китоб', 'дар', 'болои', 'миз', 'аст']},
            {ru:'Я тебя люблю', tg:['Ман', 'шуморо', 'дӯст', 'медорам']}
        ],
        bots: [{n: 'Davron', x: 2500}, {n: 'Malika', x: 2100}, {n: 'Umed', x: 1800}]
    },

    init() {
        this.tg.ready();
        this.tg.expand();
        document.getElementById('u-name').innerText = this.tg.initDataUnsafe?.user?.first_name || "Мехмон";
        this.updateXP(0);
        this.tg.BackButton.onClick(() => {
            if(App.game.sprint.timer) clearInterval(App.game.sprint.timer);
            App.nav('p-home');
        });
    },

    nav(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'p-home') {
            document.getElementById('n-home').classList.add('active');
            this.tg.BackButton.hide();
        } else if(id === 'p-rank') {
            document.getElementById('n-rank').classList.add('active');
            this.tg.BackButton.show();
            this.renderRank();
        } else { this.tg.BackButton.show(); }
    },

    updateXP(v) {
        this.xp += v;
        localStorage.setItem('user_xp_ultra', this.xp);
        document.getElementById('u-xp').innerText = this.xp;
    },

    renderRank() {
        const list = document.getElementById('rank-list');
        list.innerHTML = '';
        const me = {n: (this.tg.initDataUnsafe?.user?.first_name || "Я"), x: this.xp, isMe: true};
        const all = [...this.db.bots, me].sort((a,b) => b.x - a.x);
        all.forEach((l, i) => {
            const item = document.createElement('div');
            item.className = `rank-item ${l.isMe ? 'rank-me' : ''}`;
            item.innerHTML = `<span>${i+1}. ${l.n}</span> <b>${l.x} XP</b>`;
            list.appendChild(item);
        });
    },

    game: {
        sprint: {
            timeLeft: 30, timer: null, curCorrect: false,
            start() {
                this.timeLeft = 30;
                App.nav('g-sprint');
                this.next();
                this.timer = setInterval(() => {
                    this.timeLeft--;
                    document.getElementById('spr-time').innerText = this.timeLeft + 's';
                    if(this.timeLeft <= 0) {
                        clearInterval(this.timer);
                        App.tg.showAlert("Время вышло! Твой результат сохранен.");
                        App.nav('p-home');
                    }
                }, 1000);
            },
            next() {
                const isTrue = Math.random() > 0.5;
                const word = App.db.words[Math.floor(Math.random()*App.db.words.length)];
                document.getElementById('spr-q').innerText = word.q;
                if(isTrue) {
                    document.getElementById('spr-a').innerText = word.a;
                    this.curCorrect = true;
                } else {
                    let randA = App.db.words[Math.floor(Math.random()*App.db.words.length)].a;
                    while(randA === word.a) randA = App.db.words[Math.floor(Math.random()*App.db.words.length)].a;
                    document.getElementById('spr-a').innerText = randA;
                    this.curCorrect = false;
                }
            },
            check(userAns) {
                if(userAns === this.curCorrect) {
                    App.updateXP(15);
                    App.tg.HapticFeedback.impactOccurred('light');
                } else {
                    App.tg.HapticFeedback.notificationOccurred('error');
                }
                this.next();
            }
        },
        duels: {
            start() { App.nav('g-duels'); this.next(); },
            next() {
                const cur = App.db.words[Math.floor(Math.random()*App.db.words.length)];
                document.getElementById('duel-q').innerText = cur.q;
                let opts = [cur.a];
                while(opts.length < 4) {
                    let r = App.db.words[Math.floor(Math.random()*App.db.words.length)].a;
                    if(!opts.includes(r)) opts.push(r);
                }
                opts.sort(() => Math.random() - 0.5);
                const cont = document.getElementById('duel-opts');
                cont.innerHTML = '';
                opts.forEach(o => {
                    const b = document.createElement('button');
                    b.className = 'btn-opt';
                    b.innerText = o;
                    b.onclick = () => {
                        if(o === cur.a) { App.updateXP(10); App.tg.HapticFeedback.impactOccurred('medium'); this.next(); }
                        else { App.tg.HapticFeedback.notificationOccurred('error'); b.style.borderColor = 'red'; }
                    };
                    cont.appendChild(b);
                });
            }
        },
        build: {
            idx: 0, chosen: [],
            start() { this.idx = Math.floor(Math.random()*App.db.phrases.length); this.chosen = []; App.nav('g-build'); this.render(); },
            render() {
                const data = App.db.phrases[this.idx];
                document.getElementById('build-task').innerText = data.ru;
                const target = document.getElementById('build-target');
                target.innerHTML = '';
                this.chosen.forEach((w, i) => {
                    const c = document.createElement('div');
                    c.className = 'word-chip';
                    c.innerText = w;
                    c.onclick = () => { this.chosen.splice(i, 1); this.render(); };
                    target.appendChild(c);
                });
                const pool = document.getElementById('build-pool');
                pool.innerHTML = '';
                let remain = [...data.tg];
                this.chosen.forEach(cw => { let p = remain.indexOf(cw); if(p > -1) remain.splice(p, 1); });
                remain.forEach(w => {
                    const c = document.createElement('div');
                    c.className = 'word-chip chip-p';
                    c.innerText = w;
                    c.onclick = () => { this.chosen.push(w); this.render(); };
                    pool.appendChild(c);
                });
            },
            check() {
                const data = App.db.phrases[this.idx];
                if(this.chosen.join(' ') === data.tg.join(' ')) {
                    App.updateXP(30); App.tg.HapticFeedback.notificationOccurred('success');
                    this.start();
                } else { alert("Хато!"); }
            }
        }
    }
};

App.init();
</script>
</body>
    </html>
