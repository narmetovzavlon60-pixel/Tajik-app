<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tajik Pro: Telegram Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            /* Используем переменные Телеграма, если они есть, иначе — наши цвета */
            --bg: var(--tg-theme-bg-color, #0F0F1A);
            --surface: var(--tg-theme-secondary-bg-color, #1A1A2E);
            --primary: var(--tg-theme-button-color, #E8A045);
            --text: var(--tg-theme-text-color, #E0E0E0);
            --accent: #2D6A4F;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        header { padding: 15px 20px; background: var(--surface); display: flex; justify-content: space-between; border-bottom: 2px solid var(--primary); }

        .page { position: absolute; top: 60px; bottom: 0; width: 100%; padding: 20px; display: none; overflow-y: auto; transition: 0.3s; }
        .page.active { display: block; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* Игровые элементы */
        .swipe-card { width: 260px; height: 320px; background: var(--primary); color: var(--tg-theme-button-text-color, #000); border-radius: 24px; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; font-weight: bold; margin: 20px auto; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .chip { background: var(--surface); border: 1px solid var(--primary); padding: 12px 20px; border-radius: 12px; cursor: pointer; margin: 5px; display: inline-block; }
        .btn { background: var(--primary); color: var(--tg-theme-button-text-color, #000); border: none; padding: 18px; border-radius: 12px; width: 100%; font-weight: bold; font-size: 1rem; margin-top: 10px; }
        
        .sentence-area { min-height: 100px; background: rgba(0,0,0,0.2); border-radius: 15px; padding: 15px; margin: 20px 0; border: 1px dashed var(--primary); }
    </style>
</head>
<body>

<header>
    <div id="user-name">Салом!</div>
    <div style="font-weight: bold;">⭐ <span id="xp-display">0</span></div>
</header>

<main id="app-router">
    <section id="home" class="page active">
        <h2 id="welcome-msg">Омӯзиши забон</h2>
        <p id="srs-status" style="color: var(--primary); margin: 10px 0 25px 0;"></p>
        
        <button class="btn" onclick="App.router.go('game-duels')">⚔️ Дуэли слов</button>
        <button class="btn" onclick="App.router.go('game-builder')">🧱 Сборщик фраз</button>
        <button class="btn" style="background: var(--surface); color: var(--text); margin-top: 40px;" onclick="App.platform.close()">Выйти</button>
    </section>

    <section id="game-duels" class="page">
        <div id="active-card" class="swipe-card">...</div>
        <div style="display:flex; gap:10px;">
            <div id="t-left" style="flex:1; padding:20px; border:1px solid var(--primary); border-radius:12px; text-align:center;"></div>
            <div id="t-right" style="flex:1; padding:20px; border:1px solid var(--primary); border-radius:12px; text-align:center;"></div>
        </div>
    </section>

    <section id="game-builder" class="page">
        <h3 id="b-task" style="text-align:center"></h3>
        <div id="s-target" class="sentence-area"></div>
        <div id="w-pool" style="text-align:center"></div>
        <button class="btn" id="check-btn" onclick="App.modules['game-builder'].check()">Проверить</button>
    </section>
</main>

<script>
const App = {
    tg: window.Telegram.WebApp,
    
    state: {
        xp: parseInt(localStorage.getItem('tg_xp')) || 0,
        srs: JSON.parse(localStorage.getItem('tg_srs')) || {}
    },

    db: {
        vocab: [
            {id:1, cyr:'Китоб', ru:'Книга'}, {id:2, cyr:'Модар', ru:'Мать'},
            {id:3, cyr:'Нон', ru:'Хлеб'}, {id:4, cyr:'Об', ru:'Вода'}
        ],
        sentences: [
            {id:101, ru:'Я иду в школу', tg:['Ман', 'ба', 'мактаб', 'меравам']}
        ]
    },

    init() {
        this.tg.ready();
        this.tg.expand(); // Развернуть на весь экран
        this.platform.applyTheme();
        this.progress.sync();
        
        // Кнопка назад в Телеграме
        this.tg.BackButton.onClick(() => this.router.go('home'));
    },

    router: {
        go(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            
            // Показываем кнопку назад, если мы не на главной
            if (pageId === 'home') App.tg.BackButton.hide();
            else App.tg.BackButton.show();

            if (App.modules[pageId]?.init) App.modules[pageId].init();
        }
    },

    modules: {
        'game-duels': {
            init() { this.setup(); },
            setup() {
                this.curr = App.db.vocab[Math.floor(Math.random()*App.db.vocab.length)];
                const card = document.getElementById('active-card');
                card.textContent = this.curr.cyr;
                card.style.transform = `scale(1)`;
                card.style.background = 'var(--primary)';

                let wrong = App.db.vocab[Math.floor(Math.random()*App.db.vocab.length)];
                while(wrong.id === this.curr.id) wrong = App.db.vocab[Math.floor(Math.random()*App.db.vocab.length)];

                const isL = Math.random() > 0.5;
                const l = document.getElementById('t-left'), r = document.getElementById('t-right');
                l.textContent = isL ? this.curr.ru : wrong.ru; l.onclick = () => this.verify(isL);
                r.textContent = isL ? wrong.ru : this.curr.ru; r.onclick = () => this.verify(!isL);
            },
            verify(ok) {
                if(ok) {
                    App.platform.haptic('success');
                    App.progress.addXP(10);
                    document.getElementById('active-card').style.background = "#4CAF50";
                } else {
                    App.platform.haptic('error');
                    document.getElementById('active-card').style.background = "#FF5252";
                }
                setTimeout(() => this.setup(), 500);
            }
        },
        'game-builder': {
            init() { 
                this.curr = App.db.sentences[Math.floor(Math.random()*App.db.sentences.length)];
                this.ans = []; this.render();
            },
            render() {
                document.getElementById('b-task').textContent = this.curr.ru;
                const t = document.getElementById('s-target'); t.innerHTML = '';
                this.ans.forEach((w, i) => {
                    const c = document.createElement('div'); c.className='chip'; c.textContent=w;
                    c.onclick=() => { this.ans.splice(i,1); this.render(); };
                    t.appendChild(c);
                });
                const p = document.getElementById('w-pool'); p.innerHTML = '';
                [...this.curr.tg].sort(()=>Math.random()-0.5).forEach(w => {
                    const c = document.createElement('div'); c.className='chip'; c.textContent=w;
                    c.onclick=() => { this.ans.push(w); this.render(); };
                    p.appendChild(c);
                });
            },
            check() {
                const ok = JSON.stringify(this.ans) === JSON.stringify(this.curr.tg);
                if(ok) { App.platform.haptic('success'); App.progress.addXP(20); this.init(); }
                else { App.platform.haptic('error'); alert("Попробуй еще раз"); this.ans=[]; this.render(); }
            }
        }
    },

    progress: {
        addXP(v) { this.sync(v); },
        sync(v = 0) {
            App.state.xp += v;
            localStorage.setItem('tg_xp', App.state.xp);
            document.getElementById('xp-display').textContent = App.state.xp;
            
            // Если есть имя в ТГ, пишем его
            const user = App.tg.initDataUnsafe?.user;
            if (user) document.getElementById('user-name').textContent = `Салом, ${user.first_name}!`;
        }
    },

    platform: {
        applyTheme() {
            document.documentElement.style.setProperty('--bg', App.tg.themeParams.bg_color);
            document.documentElement.style.setProperty('--text', App.tg.themeParams.text_color);
        },
        haptic(type) {
            if (this.isTG()) App.tg.HapticFeedback.notificationOccurred(type);
        },
        isTG() { return !!window.Telegram?.WebApp?.initData; },
        close() { App.tg.close(); }
    }
};

window.onload = () => App.init();
</script>
</body>
</html>
