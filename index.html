<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tajik Pro: Cloud Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg:#0F0F1A; --surf:#1A1A2E; --prim:#FFB74D; --text:#E0E0E0; --green:#4CAF50; --red:#FF5252; }
        *{ box-sizing:border-box; margin:0; padding:0; font-family:sans-serif;
           -webkit-tap-highlight-color:transparent; touch-action:manipulation; }
        body{ background:var(--bg); color:var(--text); height:100vh; overflow:hidden; display:flex; flex-direction:column; }
        header{ padding:8px 12px; background:var(--surf); display:flex; justify-content:space-between;
                align-items:center; border-bottom:2px solid var(--prim); gap:6px; flex-shrink:0; }
        .page{ display:none; padding:16px; flex:1; overflow-y:auto; }
        .active{ display:block; }
        .card{ background:var(--surf); padding:16px; border-radius:15px; margin-bottom:10px;
               border-left:4px solid var(--prim); cursor:pointer; }
        .game-display{ height:130px; background:rgba(255,255,255,0.05); border-radius:15px;
                       display:flex; flex-direction:column; align-items:center; justify-content:center;
                       margin-bottom:16px; }
        .grid-2{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
        .btn-opt{ background:var(--surf); border:1px solid var(--prim); color:white;
                  padding:18px 5px; border-radius:12px; font-size:0.95rem; cursor:pointer; width:100%; }
        .main-action{ width:100%; padding:16px; background:var(--prim); border:none;
                      border-radius:12px; font-weight:800; color:#000; margin-top:12px; cursor:pointer; font-size:1rem; }
        .drop-zone{ min-height:56px; background:rgba(255,255,255,0.03); border:1px dashed var(--prim);
                    border-radius:12px; padding:8px; margin-bottom:12px; display:flex; flex-wrap:wrap; gap:5px; }
        .chip{ background:var(--prim); color:#000; padding:7px 11px; border-radius:8px;
               font-weight:bold; cursor:pointer; user-select:none; }
        .modal{ position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg);
                display:none; flex-direction:column; align-items:center; justify-content:center;
                z-index:1000; padding:20px; text-align:center; }
        nav{ background:var(--surf); display:flex; justify-content:space-around;
             padding:8px; border-top:1px solid #333; flex-shrink:0; }
        .nav-btn{ opacity:0.5; text-align:center; font-size:0.75rem; cursor:pointer; padding:4px 8px; }
        .nav-btn.active{ opacity:1; color:var(--prim); }
        .rank-badge{ font-size:0.7rem; background:rgba(255,183,77,0.15); border:1px solid var(--prim);
                     padding:3px 7px; border-radius:10px; white-space:nowrap; }
        .xp-bar-wrap{ height:6px; background:rgba(255,255,255,0.1); border-radius:3px; overflow:hidden; }
        .xp-bar{ height:100%; background:var(--prim); border-radius:3px; transition:width .4s ease; }
        .daily-card{ background:var(--surf); border-radius:15px; padding:13px; margin-bottom:10px; }
        .stat-row{ display:flex; justify-content:space-between; align-items:center; padding:5px 0;
                   border-bottom:1px solid rgba(255,255,255,0.05); }
        .stat-row:last-child{ border-bottom:none; }
        #rank-flash{ position:fixed; top:60px; left:50%; transform:translateX(-50%);
                     background:var(--prim); color:#000; padding:8px 20px; border-radius:20px;
                     font-weight:800; font-size:0.9rem; opacity:0; transition:opacity .4s; z-index:500;
                     pointer-events:none; white-space:nowrap; }
        .res-info{ white-space:pre-line; margin:16px; font-size:1.1rem; line-height:1.7; }
    </style>
</head>
<body>
<header>
    <div id="u-lives" style="color:var(--red);font-size:0.9rem">❤️❤️❤️</div>
    <div id="u-rank" class="rank-badge">🌱 Навчӣ</div>
    <div style="font-size:0.9rem">⭐ <span id="u-xp">0</span></div>
</header>
<div id="rank-flash"></div>
<div id="res-modal" class="modal">
    <h1 id="res-status">БОЗӢ ТАМОМ</h1>
    <div id="res-rank-up" style="display:none;color:var(--prim);font-size:1.4rem;margin-top:10px;"></div>
    <p class="res-info" id="res-info"></p>
    <button class="main-action" style="width:80%;max-width:300px" onclick="location.reload()">ИГРАТЬ СНОВА</button>
</div>
<main style="flex:1;overflow:hidden;display:flex;flex-direction:column;">
    <section id="p-home" class="page active">
        <div class="daily-card">
            <div style="display:flex;justify-content:space-between;margin-bottom:7px;">
                <span>📅 Цель дня</span>
                <span id="daily-txt" style="color:var(--prim);font-weight:bold">0 / 100 XP</span>
            </div>
            <div class="xp-bar-wrap"><div id="daily-bar" class="xp-bar" style="width:0%"></div></div>
        </div>
        <div class="card" onclick="startSprint()">
            <h3>⚡ Спринт</h3>
            <p style="opacity:0.7;font-size:0.85rem;margin-top:3px">30 секунд · 3 жизни · комбо-бонус</p>
        </div>
        <div class="card" onclick="startDuels()">
            <h3>⚔️ Дуэли</h3>
            <p style="opacity:0.7;font-size:0.85rem;margin-top:3px">Выбери правильный перевод</p>
        </div>
        <div class="card" onclick="startBuild()">
            <h3>🧱 Созандаи ҷумла</h3>
            <p style="opacity:0.7;font-size:0.85rem;margin-top:3px">Собери фразу из слов</p>
        </div>
    </section>
    <section id="p-stats" class="page">
        <h2 style="margin-bottom:12px;color:var(--prim)">📊 Мои успехи</h2>
        <div class="card">
            <div id="stats-emoji" style="font-size:2.5rem;text-align:center;margin-bottom:6px"></div>
            <div id="stats-rname" style="text-align:center;font-size:1.1rem;font-weight:bold;margin-bottom:10px"></div>
            <div class="stat-row"><span>Всего XP</span><span id="stats-xp" style="color:var(--prim);font-weight:bold"></span></div>
            <div class="stat-row"><span>🔥 Серия дней</span><span id="stats-streak"></span></div>
        </div>
        <div id="ranks-list"></div>
    </section>
    <section id="g-sprint" class="page">
        <div id="timer" style="text-align:center;font-weight:bold;color:var(--prim);font-size:1.1rem;">30s</div>
        <div class="game-display"><div id="spr-q" style="font-size:2rem;font-weight:bold"></div><div id="spr-a" style="opacity:0.65;"></div></div>
        <div class="grid-2"><button class="btn-opt" onclick="checkSprint(false)">✗ НЕТ</button><button class="btn-opt" onclick="checkSprint(true)">✓ ДА</button></div>
    </section>
    <section id="g-duels" class="page">
        <div class="game-display"><h2 id="duel-q"></h2></div>
        <div id="duel-opts" class="grid-2"></div>
    </section>
    <section id="g-build" class="page">
        <p id="build-task" style="text-align:center;margin-bottom:10px;font-weight:bold"></p>
        <div id="build-target" class="drop-zone"></div>
        <div id="build-pool" style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:10px;"></div>
        <button class="main-action" onclick="checkBuild()">✓ ПРОВЕРИТЬ</button>
    </section>
</main>
<nav>
    <div class="nav-btn active" id="nav-home" onclick="goNav('p-home','nav-home')">🏠<br>Асосӣ</div>
    <div class="nav-btn" id="nav-stats" onclick="goNav('p-stats','nav-stats')">🏆<br>Натиҷаҳо</div>
</nav>
<script>
const tg = window.Telegram.WebApp;
let xp = parseInt(localStorage.getItem('xp_v7')) || 0;
let lives = 3, sessionXP = 0, combo = 0, maxCombo = 0;
const today = new Date().toISOString().slice(0,10);
let dailyXP = 0, streak = parseInt(localStorage.getItem('streak_v1')) || 1;

// Система рангов
const RANKS = [
    { min:0, emoji:'🌱', name:'Навчӣ' }, { min:500, emoji:'⭐', name:'Шогирд' }, { min:1500, emoji:'🔥', name:'Устод' }
];
function getRank(v){ let r=RANKS[0]; for(let i=RANKS.length-1;i>=0;i--){ if(v>=RANKS[i].min){r=RANKS[i];break;} } return r; }

// Исправленная функция начисления XP с бонусом за серию
function addXP(amount) {
    let bonus = streak >= 3 ? 1.2 : 1.0;
    let final = Math.round(amount * bonus);
    xp += final; sessionXP += final; dailyXP += final;
    updateUI();
}

// Исправленная логика "Созандаи ҷумла"
function checkBuild() {
    if (chosen.join(' ') === curP.tg.join(' ')) {
        addXP(30);
        tg.HapticFeedback.notificationOccurred('success');
        chosen = []; nextBuild();
    } else {
        lives--;
        chosen = []; // СБРОС СЛОВ ПРИ ОШИБКЕ
        renderBuild();
        tg.HapticFeedback.notificationOccurred('error');
        updateUI();
    }
}

// База данных (вставь свои 500 слов сюда при желании)
const db = {
    words: [{q:'Нон', a:'Хлеб'}, {q:'Об', a:'Вода'}], // Пример
    phrases: [{ru:'Привет', tg:['Салом']}] // Пример
};

// ... остальные функции управления страницами (go, updateUI, end) ...
// Здесь должны быть остальные функции из твоего предыдущего кода

tg.ready();
tg.expand();
updateUI();
</script>
</body>
</html>
